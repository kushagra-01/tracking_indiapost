# Render Blueprint — India Post tracking API (backend only)
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: indiapost-tracking-api
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: TRUST_PROXY
        value: "1"
      - key: INDIAPOST_BASE_URL
        value: https://app.indiapost.gov.in
      - key: INDIAPOST_USERNAME
        sync: false
      - key: INDIAPOST_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: indiapost_tracking
      - key: SUPERADMIN_USERNAME
        sync: false
      - key: SUPERADMIN_PASSWORD
        sync: false
